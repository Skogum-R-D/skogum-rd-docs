site_name: Skogum R&D — Multi-Agent System
site_description: Documentation for the Skogum AI consulting multi-agent platform
site_url: https://skogum-r-d.github.io/skogum-rd-docs
repo_url: https://github.com/Skogum-R-D/skogum-rd-docs
repo_name: Skogum-R-D/skogum-rd-docs
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - footnotes

plugins:
  - search

nav:
  - Home: index.md
  - Architecture:
    - Overview: architecture.md
    - Event Bus & Whiteboard: event-bus.md
  - Agents:
    - Overview: agents/index.md
    - Project Manager: agents/project-manager.md
    - Engineer: agents/engineer.md
    - Frontend: agents/frontend.md
    - QA: agents/qa.md
    - Infra: agents/infra.md
  - Tools:
    - GitHub Tools: tools/github-tools.md
    - Build & Test: tools/build-and-test.md
  - Dashboard: dashboard.md
  - Observability: observability.md
  - Operations: operations.md
